<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Elections - Adeleke University Voting Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#003DA5",
                        "primary-dark": "#102694",
                        secondary: "#FFD700",
                        "background-light": "#FAFAFA",
                        "background-dark": "#0A0A0A",
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#1e2330",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.75rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px"},
                },
            },
        }
    </script>

<style id="au-brand-overrides">
  /* ===== AU Brand Colors Override ===== */
  /* Royal Blue: #003DA5 | AU Yellow: #F5B400 | White: #FAFAFA | Black: #0A0A0A */

  /* Active sidebar items get yellow left border */
  .bg-primary\/10 { border-left: 4px solid #F5B400 !important; }

  /* Progress bars: yellow fill */
  .bg-primary.rounded-full[style*="width"] { background-color: #F5B400 !important; }
  div[class*="bg-primary"][class*="rounded-full"][class*="h-1"],
  div[class*="bg-primary"][class*="rounded-full"][class*="h-2"],
  div[class*="bg-primary"][class*="rounded-full"][class*="h-1.5"] {
    background-color: #F5B400 !important;
  }

  /* Live/ENDS SOON badges: yellow instead of red */
  .bg-red-500.rounded-full, .bg-red-500.px-2 {
    background-color: #F5B400 !important;
    color: #000 !important;
  }

  /* Camera scan frame corners: yellow */
  [class*="border-t-4"][class*="border-primary"],
  [class*="border-b-4"][class*="border-primary"],
  [class*="border-l-4"][class*="border-primary"],
  [class*="border-r-4"][class*="border-primary"] {
    border-color: #F5B400 !important;
  }

  /* Scan line glow: yellow */
  [class*="bg-primary"][class*="shadow-"][style*="width:80%"],
  [class*="animate-scanline"] div[class*="bg-primary"] {
    background-color: #F5B400 !important;
    box-shadow: 0 0 15px rgba(245,180,0,0.8) !important;
  }

  /* Selected candidate card border: yellow */
  [class*="border-primary"][class*="shadow-lg"] {
    border-color: #F5B400 !important;
    box-shadow: 0 10px 25px rgba(245,180,0,0.15) !important;
  }

  /* Selected candidate radio dot: yellow */
  [class*="bg-primary"][class*="rounded-full"][class*="group-hover\:scale"] {
    background-color: #F5B400 !important;
  }

  /* Verified check badges on candidates: yellow */
  [class*="bg-primary"][class*="rounded-full"][class*="p-1"] {
    background-color: #F5B400 !important;
    color: #000 !important;
  }

  /* KPI/stat card accent lines at bottom */
  div[class*="bg-primary"][class*="h-1"][class*="rounded-full"] {
    background-color: #F5B400 !important;
  }

  /* Step badges: yellow-tinted bg */
  [class*="bg-primary\/10"][class*="px-2"][class*="py-1"] {
    background-color: #FFF5D6 !important;
    color: #8B6D00 !important;
  }

  /* Capture button (verify screen): yellow ring */
  button[class*="bg-primary"][class*="rounded-full"][class*="shadow-lg"] {
    background-color: #F5B400 !important;
    color: #000 !important;
  }

  /* Stat card icon backgrounds: slightly yellow-tinted */
  .bg-primary\/10 > .material-symbols-outlined {
    color: #003DA5 !important;
  }

  /* University logo wrapper ring */
  .rounded-lg.bg-primary\/10.text-primary {
    box-shadow: inset 0 0 0 2px rgba(245,180,0,0.3);
  }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display antialiased">
    <div class="flex h-screen w-full overflow-hidden">
        <main class="flex h-full flex-1 flex-col overflow-y-auto bg-background-light dark:bg-background-dark relative">
            
            <!-- Mobile Header -->
            <header class="flex h-16 items-center border-b border-slate-200 dark:border-slate-800 bg-surface-light dark:bg-surface-dark px-4 lg:hidden sticky top-0 z-30">
                <img src="/assets/au-logo.jpg" alt="Adeleke University Logo" class="size-10 rounded-full object-cover shadow-sm border border-slate-200 dark:border-slate-700 bg-white" />
                <h1 class="text-base font-bold text-[#003DA5] dark:text-white hidden sm:block tracking-tight ml-3">Adeleke University</h1>
            </header>

            <!-- Desktop Header -->
            <div class="sticky top-0 z-20 hidden h-24 items-center justify-between bg-surface-light/90 dark:bg-background-dark/90 px-8 backdrop-blur-md lg:flex border-b border-transparent dark:border-slate-800">
                <div class="flex items-center gap-3 sm:gap-4">
                    <img src="/assets/au-logo.jpg" alt="Adeleke University Logo" class="size-12 sm:size-16 rounded-full object-cover border-2 sm:border-4 border-[#F5B400]/50 shadow-sm bg-white" />
                    <div>
                        <h2 class="text-xl sm:text-2xl font-black text-[#003DA5] dark:text-white leading-tight tracking-tight">Adeleke University</h2>
                        <p class="text-xs sm:text-sm text-slate-500 dark:text-slate-400 font-bold tracking-wide">Voting Portal</p>
                    </div>
                </div>
            </div>

            <div class="w-full max-w-[1000px] mx-auto p-4 lg:p-8 space-y-8 pb-24">
                <div class="flex items-center justify-between mb-2">
                    <a href="/dashboard.html" class="flex items-center gap-2 text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-primary transition-colors">
                        <span class="material-symbols-outlined text-lg">arrow_back</span>
                        Back to Dashboard
                    </a>
                    <div id="admin-controls" class="hidden">
                        <a href="/create-election.html" class="flex items-center gap-2 rounded-lg bg-primary px-4 py-2 text-sm font-bold text-white shadow-lg shadow-[#003DA5]/20 hover:bg-primary-dark transition-colors">
                            <span class="material-symbols-outlined text-[20px]">add_circle</span>
                            <span class="hidden sm:inline">Create Election</span>
                        </a>
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white flex items-center gap-3">
                        <span class="material-symbols-outlined text-primary text-4xl">how_to_vote</span>
                        Available Elections
                    </h1>
                    <p class="text-slate-500 dark:text-slate-400">Select an active election below to view the ballot and cast your vote.</p>
                </div>

                <div id="elections-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                    <!-- Elections will be loaded here via JS -->
                    <div class="animate-pulse flex flex-col gap-4 overflow-hidden rounded-2xl bg-white dark:bg-surface-dark p-6 shadow-sm ring-1 ring-slate-100 dark:ring-slate-800">
                        <div class="h-32 w-full rounded-xl bg-slate-200 dark:bg-slate-700"></div>
                        <div class="h-6 w-3/4 rounded bg-slate-200 dark:bg-slate-700"></div>
                        <div class="h-4 w-1/2 rounded bg-slate-200 dark:bg-slate-700"></div>
                        <div class="mt-4 h-10 w-full rounded-lg bg-slate-200 dark:bg-slate-700"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Scripts -->
    <script src="/src/shared.js"></script>
    <script src="/src/pages/elections.js"></script>

<script>
// ============================================
// AU Voting System - Shared Frontend Logic
// ============================================

const API_BASE = 'http://localhost:8000/api';

// --- Dark Mode ---
function initDarkMode() {
    const saved = localStorage.getItem('au-dark-mode');
    if (saved === 'true' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }
}

function toggleDarkMode() {
    document.documentElement.classList.toggle('dark');
    localStorage.setItem('au-dark-mode', document.documentElement.classList.contains('dark'));
    updateToggleIcon();
}

function updateToggleIcon() {
    const btn = document.getElementById('dark-mode-toggle');
    if (btn) {
        const icon = btn.querySelector('.material-symbols-outlined');
        if (icon) {
            icon.textContent = document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
        }
    }
}

// --- API Client ---
async function apiCall(endpoint, options = {}) {
    const token = localStorage.getItem('au-token');
    const headers = { 'Content-Type': 'application/json', ...options.headers };
    if (token) headers['Authorization'] = `Token ${token}`;

    const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
    const data = await response.json().catch(() => ({}));

    if (!response.ok) {
        const errorMsg = data.error || data.detail || Object.values(data).flat().join(', ') || 'Request failed';
        throw { status: response.status, message: errorMsg, data };
    }
    return data;
}

// --- Auth Helpers ---
function getSession() {
    try { return JSON.parse(localStorage.getItem('au-session')); } catch { return null; }
}

function setSession(data) {
    localStorage.setItem('au-session', JSON.stringify(data));
}

function clearSession() {
    localStorage.removeItem('au-session');
    localStorage.removeItem('au-token');
}

function requireStudentAuth() {
    const s = getSession();
    if (!s || s.role !== 'student') { window.location.href = '/'; return null; }
    return s;
}

function requireAdminAuth() {
    const s = getSession();
    if (!s || s.role !== 'admin') { window.location.href = '/'; return null; }
    return s;
}

async function logout() {
    try { await apiCall('/auth/logout/', { method: 'POST' }); } catch { }
    clearSession();
    window.location.href = '/';
}

// --- Toast Notifications ---
function showToast(message, type) {
    const colors = {
        success: 'bg-green-600',
        error: 'bg-red-600',
        info: 'bg-primary'
    };
    const toast = document.createElement('div');
    toast.className = 'fixed top-6 right-6 z-[200] ' + (colors[type] || colors.info) + ' text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 animate-slide-in font-medium text-sm';
    toast.innerHTML = '<span class="material-symbols-outlined text-lg">' +
        (type === 'success' ? 'check_circle' : type === 'error' ? 'error' : 'info') +
        '</span>' + message;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(100px)'; setTimeout(() => toast.remove(), 300); }, 3000);
}

// --- Student Navigation (Floating FAB) ---
function createStudentNav(currentPage) {
    const pages = [
        { href: '/dashboard.html', icon: 'space_dashboard', label: 'Dashboard', id: 'dashboard' },
        { href: '/elections.html', icon: 'how_to_vote', label: 'Elections', id: 'elections' },
        { href: '/results.html', icon: 'bar_chart', label: 'Election Results', id: 'results' },
        { href: '/profile.html', icon: 'account_circle', label: 'My Profile', id: 'profile' },
    ];
    _createFloatingNav(pages, currentPage);
}

// --- Admin Navigation (Floating FAB) ---
function createAdminNav(currentPage) {
    const pages = [
        { href: '/admin.html', icon: 'admin_panel_settings', label: 'Dashboard', id: 'admin' },
        { href: '/monitoring.html', icon: 'analytics', label: 'Live Monitoring', id: 'monitoring' },
        { href: '/create-election.html', icon: 'add_circle', label: 'Create Election', id: 'create-election' },
        { href: '/admin-results.html', icon: 'assessment', label: 'Results Report', id: 'admin-results' },
        { href: '/admin-settings.html', icon: 'settings', label: 'Profile & Settings', id: 'admin-settings' },
    ];
    _createFloatingNav(pages, currentPage);
}

// --- Floating Nav Builder (shared) ---
function _createFloatingNav(pages, currentPage) {
    const nav = document.createElement('div');
    nav.id = 'floating-nav';
    nav.innerHTML = `
    <button id="nav-toggle" onclick="document.getElementById('floating-nav').classList.toggle('open')"
      class="fixed bottom-6 left-6 z-[100] size-14 rounded-full bg-primary text-white shadow-xl shadow-primary/30 flex items-center justify-center hover:bg-[#002D7A] transition-all hover:scale-105 active:scale-95 cursor-pointer">
      <span class="material-symbols-outlined text-2xl">menu</span>
    </button>
    <div id="nav-panel" class="fixed bottom-24 left-6 z-[99] bg-white dark:bg-[#141414] rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-700 p-3 w-64 transition-all origin-bottom-left scale-0 opacity-0">
      <div class="flex items-center justify-between px-3 py-2 mb-2 border-b border-slate-100 dark:border-slate-800">
        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Navigation</span>
        <button id="dark-mode-toggle" onclick="toggleDarkMode()" class="size-8 rounded-lg flex items-center justify-center text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors cursor-pointer">
          <span class="material-symbols-outlined text-lg">${document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode'}</span>
        </button>
      </div>
      <nav class="flex flex-col gap-0.5 max-h-80 overflow-y-auto">
        ${pages.map(p => `
          <a href="${p.href}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors ${p.id === currentPage
            ? 'bg-primary/10 text-primary'
            : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white'
        }">
            <span class="material-symbols-outlined text-lg">${p.icon}</span>
            ${p.label}
          </a>
        `).join('')}
      </nav>
    </div>
  `;
    document.body.appendChild(nav);

    const style = document.createElement('style');
    style.textContent = `
    #floating-nav.open #nav-panel { transform: scale(1); opacity: 1; }
    #floating-nav.open #nav-toggle { background: #ef4444; }
    #floating-nav.open #nav-toggle span { font-size: 0; }
    #floating-nav.open #nav-toggle span::after { content: 'close'; font-size: 24px; font-family: 'Material Symbols Outlined'; }
    #nav-panel { transition: transform 0.2s ease, opacity 0.2s ease; }
    .animate-slide-in { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity:0; transform: translateX(100px); } to { opacity:1; transform: translateX(0); } }
  `;
    document.head.appendChild(style);

    document.addEventListener('click', (e) => {
        const nav = document.getElementById('floating-nav');
        if (nav && !nav.contains(e.target)) nav.classList.remove('open');
    });
}

// Init dark mode on every page
initDarkMode();

// Elections Selection Page Logic
document.addEventListener('DOMContentLoaded', async () => {
    createStudentNav('elections');
    const session = requireStudentAuth();
    if (!session) return;

    if (session.user && session.user.role === 'admin') {
        const adminControls = document.getElementById('admin-controls');
        if (adminControls) adminControls.classList.remove('hidden');
    }

    const container = document.getElementById('elections-container');

    try {
        const elections = await apiCall('/elections/');

        if (elections.length === 0) {
            container.innerHTML = `
                <div class="col-span-1 md:col-span-2 text-center py-12 rounded-2xl border-2 border-dashed border-slate-200 dark:border-slate-800">
                    <span class="material-symbols-outlined text-6xl text-slate-300 dark:text-slate-600 mb-4">event_busy</span>
                    <h3 class="text-lg font-bold text-slate-900 dark:text-white">No Active Elections</h3>
                    <p class="text-slate-500 mt-2">There are currently no elections available for voting.</p>
                </div>
            `;
            return;
        }

        container.innerHTML = elections.map(election => `
            <div class="group relative flex flex-col gap-4 overflow-hidden rounded-2xl bg-white dark:bg-surface-dark p-6 shadow-sm ring-1 ring-slate-100 dark:ring-slate-800 transition-all hover:shadow-md hover:ring-primary/20 dark:hover:ring-primary/40">
                <div class="flex flex-col gap-4">
                    <div class="flex items-center justify-between">
                        <span class="rounded-full bg-blue-100 dark:bg-blue-900/30 px-3 py-1 text-xs font-semibold text-blue-700 dark:text-blue-300">
                            ${election.status === 'active' ? 'Active Now' : election.status}
                        </span>
                    </div>
                    <div>
                        <h4 class="text-xl font-bold text-slate-900 dark:text-white">${election.title}</h4>
                        <p class="mt-2 text-sm text-slate-600 dark:text-slate-400 line-clamp-2">
                            ${election.description || 'Participate in this election to shape the future.'}
                        </p>
                    </div>
                    <div class="mt-2 pt-4 border-t border-slate-100 dark:border-slate-800">
                        <button onclick="goToBallot('${election.id}')" 
                                class="w-full rounded-lg bg-primary px-5 py-3 text-sm font-bold text-white shadow-md shadow-[#003DA5]/20 hover:bg-primary-dark transition-all flex justify-center items-center gap-2">
                            <span>Open Ballot</span>
                            <span class="material-symbols-outlined text-lg">arrow_forward</span>
                        </button>
                    </div>
                </div>
            </div>
        `).join('');

    } catch (err) {
        console.error('Failed to fetch elections:', err);
        container.innerHTML = `
            <div class="col-span-1 md:col-span-2 text-center py-12 bg-red-50 dark:bg-red-900/10 rounded-2xl text-red-600">
                <span class="material-symbols-outlined text-4xl mb-2">error</span>
                <p>Failed to load elections. Please try again later.</p>
            </div>
        `;
    }
});

// Global function to handle routing
window.goToBallot = (electionId) => {
    localStorage.setItem('au-active-election', electionId);
    window.location.href = '/ballot.html';
};

</script>
</body>
</html>
