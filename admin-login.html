<style id="au-brand-overrides">
  /* ===== AU Brand Colors Override ===== */
  /* Royal Blue: #003DA5 | AU Yellow: #F5B400 | White: #FAFAFA | Black: #0A0A0A */

  /* Active sidebar items get yellow left border */
  .bg-primary\/10 { border-left: 4px solid #F5B400 !important; }

  /* Progress bars: yellow fill */
  .bg-primary.rounded-full[style*="width"] { background-color: #F5B400 !important; }
  div[class*="bg-primary"][class*="rounded-full"][class*="h-1"],
  div[class*="bg-primary"][class*="rounded-full"][class*="h-2"],
  div[class*="bg-primary"][class*="rounded-full"][class*="h-1.5"] {
    background-color: #F5B400 !important;
  }

  /* Live/ENDS SOON badges: yellow instead of red */
  .bg-red-500.rounded-full, .bg-red-500.px-2 {
    background-color: #F5B400 !important;
    color: #000 !important;
  }

  /* Camera scan frame corners: yellow */
  [class*="border-t-4"][class*="border-primary"],
  [class*="border-b-4"][class*="border-primary"],
  [class*="border-l-4"][class*="border-primary"],
  [class*="border-r-4"][class*="border-primary"] {
    border-color: #F5B400 !important;
  }

  /* Scan line glow: yellow */
  [class*="bg-primary"][class*="shadow-"][style*="width:80%"],
  [class*="animate-scanline"] div[class*="bg-primary"] {
    background-color: #F5B400 !important;
    box-shadow: 0 0 15px rgba(245,180,0,0.8) !important;
  }

  /* Selected candidate card border: yellow */
  [class*="border-primary"][class*="shadow-lg"] {
    border-color: #F5B400 !important;
    box-shadow: 0 10px 25px rgba(245,180,0,0.15) !important;
  }

  /* Selected candidate radio dot: yellow */
  [class*="bg-primary"][class*="rounded-full"][class*="group-hover\:scale"] {
    background-color: #F5B400 !important;
  }

  /* Verified check badges on candidates: yellow */
  [class*="bg-primary"][class*="rounded-full"][class*="p-1"] {
    background-color: #F5B400 !important;
    color: #000 !important;
  }

  /* KPI/stat card accent lines at bottom */
  div[class*="bg-primary"][class*="h-1"][class*="rounded-full"] {
    background-color: #F5B400 !important;
  }

  /* Step badges: yellow-tinted bg */
  [class*="bg-primary\/10"][class*="px-2"][class*="py-1"] {
    background-color: #FFF5D6 !important;
    color: #8B6D00 !important;
  }

  /* Capture button (verify screen): yellow ring */
  button[class*="bg-primary"][class*="rounded-full"][class*="shadow-lg"] {
    background-color: #F5B400 !important;
    color: #000 !important;
  }

  /* Stat card icon backgrounds: slightly yellow-tinted */
  .bg-primary\/10 > .material-symbols-outlined {
    color: #003DA5 !important;
  }

  /* University logo wrapper ring */
  .rounded-lg.bg-primary\/10.text-primary {
    box-shadow: inset 0 0 0 2px rgba(245,180,0,0.3);
  }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-main antialiased min-h-screen flex flex-col">
<!-- Header / Nav -->
<header class="w-full bg-surface-light dark:bg-surface-dark border-b border-border-light dark:border-border-dark px-4 py-3 flex items-center justify-between sticky top-0 z-50">
<div class="flex items-center gap-3">
<img src="/assets/au-logo.jpg" alt="Adeleke University Logo" class="size-10 rounded-full object-cover shadow-sm border border-slate-200 dark:border-slate-700 bg-white" />

</div>

</button>

<!-- Main Content Area -->

<div class="absolute bottom-0 right-1/4 size-64 rounded-full bg-blue-400/10 blur-3xl"></div>
</div>
<!-- Login Card -->
<div class="w-full max-w-[420px] bg-surface-light dark:bg-surface-dark rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-border-light dark:border-border-dark relative z-10 overflow-hidden flex flex-col">
<!-- Hero Image / Crest Section -->
<div class="w-full h-32 bg-cover bg-center flex items-center justify-center relative border-b border-border-light dark:border-border-dark" style="background-image: linear-gradient(to bottom right, rgba(0,61,165,0.7), rgba(0,61,165,0.85)), url('/assets/senate-building.jpg');">
<!-- University Crest Logo -->
<div class="size-24 rounded-full bg-white dark:bg-slate-800 shadow-lg flex items-center justify-center border-4 border-white dark:border-slate-700 absolute -bottom-12 overflow-hidden">
<img alt="Adeleke University Logo" class="size-full object-cover" src="/assets/au-logo.jpg"/>
</div>
</div>
<!-- Card Content -->
<div class="px-6 pb-8 pt-12 flex flex-col items-center">
<h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-1 text-center">Admin Portal</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm mb-8 text-center px-4">Authorized Access Only</p>
<form class="w-full space-y-5" onsubmit="event.preventDefault();">
<!-- Matric Number Input -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-200" for="matric-no">
                            Administrator ID
                        </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">admin_panel_settings</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-normal" id="matric-no" placeholder="e.g. admin123" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<div class="flex items-center justify-between">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-200" for="password">
                                Password
                            </label>
<a class="text-xs font-semibold text-primary hover:text-primary-dark transition-colors" href="#">
                                Forgot Password?
                            </a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full pl-10 pr-10 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-normal" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 cursor-pointer" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 px-4 rounded-lg shadow-md shadow-[#003DA5]/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2 mt-2">
<span>Sign In</span>
<span class="material-symbols-outlined text-lg">login</span>
</button>
</form>
<!-- Divider -->
<div class="relative w-full my-8 flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
</div>
<span class="relative bg-surface-light dark:bg-surface-dark px-3 text-xs text-slate-500 uppercase tracking-wider">Or</span>
</div>
<!-- Student Sign-in Link -->
<div class="text-center">
<p class="text-sm text-slate-600 dark:text-slate-400">
                        Are you a student? 
                        <a class="font-bold text-primary hover:text-primary-dark hover:underline underline-offset-2 transition-colors" href="/login.html">
                            Sign in here
                        </a>
</p>
</div>
</div>
<!-- Security Footer in Card -->
<div class="bg-slate-50 dark:bg-slate-900/50 px-6 py-3 border-t border-slate-100 dark:border-slate-800 flex items-center justify-center gap-2 text-xs text-slate-500">
<span class="material-symbols-outlined text-sm text-green-600">verified_user</span>
<span>Secure SSL Encrypted Connection</span>
</div>
</div>
<!-- Bottom Copyright -->
<footer class="mt-8 text-center text-xs text-slate-400">
<p>© 2024 Adeleke University. All rights reserved.</p>
</footer>
</main>

<script>
// ============================================
// AU Voting System - Shared Frontend Logic
// ============================================

const API_BASE = 'http://localhost:8000/api';

// --- Dark Mode ---
function initDarkMode() {
    const saved = localStorage.getItem('au-dark-mode');
    if (saved === 'true' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }
}

function toggleDarkMode() {
    document.documentElement.classList.toggle('dark');
    localStorage.setItem('au-dark-mode', document.documentElement.classList.contains('dark'));
    updateToggleIcon();
}

function updateToggleIcon() {
    const btn = document.getElementById('dark-mode-toggle');
    if (btn) {
        const icon = btn.querySelector('.material-symbols-outlined');
        if (icon) {
            icon.textContent = document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
        }
    }
}

// --- API Client ---
async function apiCall(endpoint, options = {}) {
    const token = localStorage.getItem('au-token');
    const headers = { 'Content-Type': 'application/json', ...options.headers };
    if (token) headers['Authorization'] = `Token ${token}`;

    const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
    const data = await response.json().catch(() => ({}));

    if (!response.ok) {
        const errorMsg = data.error || data.detail || Object.values(data).flat().join(', ') || 'Request failed';
        throw { status: response.status, message: errorMsg, data };
    }
    return data;
}

// --- Auth Helpers ---
function getSession() {
    try { return JSON.parse(localStorage.getItem('au-session')); } catch { return null; }
}

function setSession(data) {
    localStorage.setItem('au-session', JSON.stringify(data));
}

function clearSession() {
    localStorage.removeItem('au-session');
    localStorage.removeItem('au-token');
}

function requireStudentAuth() {
    const s = getSession();
    if (!s || s.role !== 'student') { window.location.href = '/'; return null; }
    return s;
}

function requireAdminAuth() {
    const s = getSession();
    if (!s || s.role !== 'admin') { window.location.href = '/'; return null; }
    return s;
}

async function logout() {
    try { await apiCall('/auth/logout/', { method: 'POST' }); } catch { }
    clearSession();
    window.location.href = '/';
}

// --- Toast Notifications ---
function showToast(message, type) {
    const colors = {
        success: 'bg-green-600',
        error: 'bg-red-600',
        info: 'bg-primary'
    };
    const toast = document.createElement('div');
    toast.className = 'fixed top-6 right-6 z-[200] ' + (colors[type] || colors.info) + ' text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 animate-slide-in font-medium text-sm';
    toast.innerHTML = '<span class="material-symbols-outlined text-lg">' +
        (type === 'success' ? 'check_circle' : type === 'error' ? 'error' : 'info') +
        '</span>' + message;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(100px)'; setTimeout(() => toast.remove(), 300); }, 3000);
}

// --- Student Navigation (Floating FAB) ---
function createStudentNav(currentPage) {
    const pages = [
        { href: '/dashboard.html', icon: 'space_dashboard', label: 'Dashboard', id: 'dashboard' },
        { href: '/elections.html', icon: 'how_to_vote', label: 'Elections', id: 'elections' },
        { href: '/results.html', icon: 'bar_chart', label: 'Election Results', id: 'results' },
        { href: '/profile.html', icon: 'account_circle', label: 'My Profile', id: 'profile' },
    ];
    _createFloatingNav(pages, currentPage);
}

// --- Admin Navigation (Floating FAB) ---
function createAdminNav(currentPage) {
    const pages = [
        { href: '/admin.html', icon: 'admin_panel_settings', label: 'Dashboard', id: 'admin' },
        { href: '/monitoring.html', icon: 'analytics', label: 'Live Monitoring', id: 'monitoring' },
        { href: '/create-election.html', icon: 'add_circle', label: 'Create Election', id: 'create-election' },
        { href: '/admin-results.html', icon: 'assessment', label: 'Results Report', id: 'admin-results' },
        { href: '/admin-settings.html', icon: 'settings', label: 'Profile & Settings', id: 'admin-settings' },
    ];
    _createFloatingNav(pages, currentPage);
}

// --- Floating Nav Builder (shared) ---
function _createFloatingNav(pages, currentPage) {
    const nav = document.createElement('div');
    nav.id = 'floating-nav';
    nav.innerHTML = `
    <button id="nav-toggle" onclick="document.getElementById('floating-nav').classList.toggle('open')"
      class="fixed bottom-6 left-6 z-[100] size-14 rounded-full bg-primary text-white shadow-xl shadow-primary/30 flex items-center justify-center hover:bg-[#002D7A] transition-all hover:scale-105 active:scale-95 cursor-pointer">
      <span class="material-symbols-outlined text-2xl">menu</span>
    </button>
    <div id="nav-panel" class="fixed bottom-24 left-6 z-[99] bg-white dark:bg-[#141414] rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-700 p-3 w-64 transition-all origin-bottom-left scale-0 opacity-0">
      <div class="flex items-center justify-between px-3 py-2 mb-2 border-b border-slate-100 dark:border-slate-800">
        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Navigation</span>
        <button id="dark-mode-toggle" onclick="toggleDarkMode()" class="size-8 rounded-lg flex items-center justify-center text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors cursor-pointer">
          <span class="material-symbols-outlined text-lg">${document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode'}</span>
        </button>
      </div>
      <nav class="flex flex-col gap-0.5 max-h-80 overflow-y-auto">
        ${pages.map(p => `
          <a href="${p.href}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors ${p.id === currentPage
            ? 'bg-primary/10 text-primary'
            : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white'
        }">
            <span class="material-symbols-outlined text-lg">${p.icon}</span>
            ${p.label}
          </a>
        `).join('')}
      </nav>
    </div>
  `;
    document.body.appendChild(nav);

    const style = document.createElement('style');
    style.textContent = `
    #floating-nav.open #nav-panel { transform: scale(1); opacity: 1; }
    #floating-nav.open #nav-toggle { background: #ef4444; }
    #floating-nav.open #nav-toggle span { font-size: 0; }
    #floating-nav.open #nav-toggle span::after { content: 'close'; font-size: 24px; font-family: 'Material Symbols Outlined'; }
    #nav-panel { transition: transform 0.2s ease, opacity 0.2s ease; }
    .animate-slide-in { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity:0; transform: translateX(100px); } to { opacity:1; transform: translateX(0); } }
  `;
    document.head.appendChild(style);

    document.addEventListener('click', (e) => {
        const nav = document.getElementById('floating-nav');
        if (nav && !nav.contains(e.target)) nav.classList.remove('open');
    });
}

// Init dark mode on every page
initDarkMode();

// Admin Login Page Logic
document.addEventListener('DOMContentLoaded', () => {

    const form = document.querySelector('form');
    const matricInput = document.getElementById('matric-no');
    const passwordInput = document.getElementById('password');

    // Password visibility toggle
    const toggleBtn = passwordInput?.parentElement?.querySelector('button');
    if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            toggleBtn.querySelector('.material-symbols-outlined').textContent = isPassword ? 'visibility_off' : 'visibility';
        });
    }

    // Form submission
    if (form) {
        form.onsubmit = async (e) => {
            e.preventDefault();
            const matric = matricInput?.value?.trim();
            const password = passwordInput?.value;

            if (!matric) { showToast('Please enter your Administrator ID', 'error'); matricInput.focus(); return; }
            if (!password) { showToast('Please enter your password', 'error'); passwordInput.focus(); return; }

            // Disable button while loading
            const submitBtn = Array.from(form.querySelectorAll('button')).find(b => b.textContent.includes('Sign In') || b.textContent.includes('Login'));
            if (submitBtn) { submitBtn.disabled = true; submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-lg">progress_activity</span> Authenticating...'; }

            try {
                const data = await apiCall('/auth/login/', {
                    method: 'POST',
                    body: JSON.stringify({ matric, password }),
                });

                // Enforce Admin Role checking
                if (data.user.role !== 'admin') {
                    showToast('Access Denied: You are not an administrator.', 'error');
                    if (submitBtn) { submitBtn.disabled = false; submitBtn.innerHTML = '<span>Sign In</span><span class="material-symbols-outlined text-lg">login</span>'; }
                    return;
                }

                // Store token and session
                localStorage.setItem('au-token', data.token);
                setSession(data.user);

                showToast('Welcome back, Admin', 'success');
                setTimeout(() => window.location.href = '/admin.html', 800);

            } catch (err) {
                showToast(err.message || 'Authentication failed', 'error');
                if (submitBtn) { submitBtn.disabled = false; submitBtn.innerHTML = '<span>Sign In</span><span class="material-symbols-outlined text-lg">login</span>'; }
            }
        };
    }
});

</script>
</body></html>
