<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Student Sign Up - Adeleke University</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    /* FIXED: was #1978e5 (old color) instead of #003DA5 (AU Royal Blue) */
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#003DA5",
                    "primary-dark": "#002D7A",
                    "accent": "#F5B400",
                    "background-light": "#FAFAFA",
                    "background-dark": "#0A0A0A",
                    "surface-light": "#FFFFFF",
                    "surface-dark": "#141414",
                },
                fontFamily: { "display": ["Be Vietnam Pro", "sans-serif"] },
                borderRadius: {
                    "DEFAULT": "0.75rem", "lg": "1rem",
                    "xl": "1.5rem", "2xl": "2rem", "full": "9999px"
                },
            },
        },
    }
</script>
</head>
<body class="font-display min-h-screen flex flex-col items-center justify-center p-4 relative bg-slate-900">


<!-- Toast container -->
<div id="toast-container" class="fixed top-6 right-6 z-[300] flex flex-col gap-2"></div>

<!-- Main Card -->
<div class="w-full max-w-[520px] bg-white dark:bg-slate-800 rounded-xl shadow-lg border border-slate-100 dark:border-slate-700 overflow-hidden relative z-10">
    <!-- Hero Image / Crest Section -->
    <div class="w-full h-32 bg-cover bg-center flex items-center justify-center relative border-b border-border-light dark:border-border-dark" style="background-image: linear-gradient(to bottom right, rgba(0,61,165,0.7), rgba(0,61,165,0.85)), url('/assets/senate-building.jpg');">
        <!-- University Crest Logo -->
        <div class="size-24 rounded-full bg-white dark:bg-slate-800 shadow-lg flex items-center justify-center border-4 border-white dark:border-slate-700 absolute -bottom-12 overflow-hidden">
            <img src="/assets/au-logo.jpg" alt="Adeleke University Logo" class="size-full object-cover rounded-full"/>
        </div>
    </div>
    <!-- Card Content Header -->
    <div class="px-6 pb-6 pt-14 flex flex-col items-center border-b border-slate-100 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800">
        <h1 class="text-slate-900 dark:text-white text-2xl font-black tracking-tight mb-1">Adeleke University</h1>
        <h2 class="text-slate-900 dark:text-white text-base font-bold">Student E-Voting Portal</h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1 text-center">Create your secure account to participate in elections.</p>
    </div>

    <!-- Form -->
    <form id="signup-form" class="p-8 flex flex-col gap-5" novalidate>
        <!-- Name row -->
        <div class="grid grid-cols-2 gap-4">
            <label class="block group">
                <span class="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-2 ml-1">First Name</span>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-slate-400 material-symbols-outlined text-[20px]">person</span>
                    <input id="first-name" class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-sm font-medium" placeholder="John" type="text" autocomplete="given-name"/>
                </div>
            </label>
            <label class="block group">
                <span class="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-2 ml-1">Surname</span>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-slate-400 material-symbols-outlined text-[20px]">person</span>
                    <input id="last-name" class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-sm font-medium" placeholder="Doe" type="text" autocomplete="family-name"/>
                </div>
            </label>
        </div>

        <!-- Matric -->
        <label class="block group">
            <span class="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-2 ml-1">Matric Number</span>
            <div class="relative flex items-center">
                <span class="absolute left-4 text-slate-400 material-symbols-outlined text-[20px]">badge</span>
                <input id="matric" class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-sm font-medium" placeholder="e.g. 19/0123" type="text"/>
            </div>
        </label>

        <!-- Dept + Faculty -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <label class="block group">
                <span class="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-2 ml-1">Department</span>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-slate-400 material-symbols-outlined text-[20px]">category</span>
                    <select id="department" class="w-full pl-11 pr-10 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-sm font-medium appearance-none cursor-pointer">
                        <option value="" disabled selected>Select Department</option>
                        <option value="Computer Science" data-faculty="Science">Computer Science</option>
                        <option value="Mathematics" data-faculty="Science">Mathematics</option>
                        <option value="Physics" data-faculty="Science">Physics</option>
                        <option value="Law" data-faculty="Law">Law</option>
                        <option value="Mass Communication" data-faculty="Arts">Mass Communication</option>
                        <option value="English" data-faculty="Arts">English</option>
                        <option value="Accounting" data-faculty="Management Sciences">Accounting</option>
                        <option value="Business Administration" data-faculty="Management Sciences">Business Administration</option>
                        <option value="Medicine" data-faculty="Basic Medical Sciences">Medicine</option>
                        <option value="Nursing" data-faculty="Basic Medical Sciences">Nursing</option>
                        <option value="Civil Engineering" data-faculty="Engineering">Civil Engineering</option>
                        <option value="Electrical Engineering" data-faculty="Engineering">Electrical Engineering</option>
                    </select>
                    <span class="absolute right-4 text-slate-400 pointer-events-none material-symbols-outlined text-[20px]">expand_more</span>
                </div>
            </label>
            <label class="block group">
                <span class="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-2 ml-1">Faculty <span class="text-slate-400 font-normal">(auto-filled)</span></span>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-slate-400 material-symbols-outlined text-[20px]">domain</span>
                    <input id="faculty" class="w-full pl-11 pr-4 py-3 bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-500 dark:text-slate-400 text-sm font-medium cursor-not-allowed" placeholder="Auto-filled from department" readonly type="text"/>
                </div>
            </label>
        </div>

        <!-- Password -->
        <label class="block group">
            <span class="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-2 ml-1">Password</span>
            <div class="relative flex items-center">
                <span class="absolute left-4 text-slate-400 material-symbols-outlined text-[20px]">lock</span>
                <input id="password" class="w-full pl-11 pr-12 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-sm font-medium" placeholder="Create a strong password" type="password" autocomplete="new-password"/>
                <button type="button" id="toggle-password" class="absolute right-4 text-slate-400 hover:text-primary transition-colors">
                    <span class="material-symbols-outlined text-[20px]">visibility</span>
                </button>
            </div>
        </label>

        <!-- Confirm Password -->
        <label class="block group">
            <span class="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-2 ml-1">Confirm Password</span>
            <div class="relative flex items-center">
                <span class="absolute left-4 text-slate-400 material-symbols-outlined text-[20px]">lock_reset</span>
                <input id="confirm-password" class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-sm font-medium" placeholder="Repeat your password" type="password" autocomplete="new-password"/>
            </div>
        </label>

        <!-- Actions -->
        <div class="mt-2 flex flex-col gap-4">
            <button id="signup-btn" type="submit" class="w-full py-3 px-6 bg-primary hover:bg-primary-dark text-white font-bold rounded-xl shadow-lg shadow-primary/30 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                <span>Create Account</span>
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
            </button>
            <p class="text-center text-sm text-slate-500 dark:text-slate-400">
                Already have an account?
                <a href="/" class="text-primary hover:text-primary-dark font-bold ml-1 transition-colors">Sign In</a>
            </p>
        </div>
    </form>
</div>

<!-- Footer -->
<footer class="mt-8 text-center text-slate-400 text-xs font-medium z-10 relative">
    <p>© 2024 Adeleke University IT Support. All rights reserved.</p>
    <div class="flex gap-4 justify-center mt-2">
        <a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
        <span>•</span>
        <a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
    </div>
</footer>

<script>
const API_BASE = 'http://localhost:8000/api';

async function apiCall(endpoint, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...options.headers };
    const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
    const data = await response.json().catch(() => ({}));
    if (!response.ok) {
        const errorMsg = data.error || data.detail || Object.values(data).flat().join(', ') || 'Request failed';
        throw { status: response.status, message: errorMsg, data };
    }
    return data;
}

function showToast(message, type) {
    const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600' };
    const toast = document.createElement('div');
    toast.className = `${colors[type] || colors.info} text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 font-medium text-sm animate-pulse`;
    toast.innerHTML = `<span class="material-symbols-outlined text-lg">${type === 'success' ? 'check_circle' : type === 'error' ? 'error' : 'info'}</span>${message}`;
    document.getElementById('toast-container').appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
}

// Dept → Faculty auto-fill
document.getElementById('department')?.addEventListener('change', function () {
    const selected = this.options[this.selectedIndex];
    const faculty = selected.getAttribute('data-faculty') || '';
    document.getElementById('faculty').value = faculty;
});

// Password toggle
document.getElementById('toggle-password')?.addEventListener('click', function () {
    const input = document.getElementById('password');
    const icon = this.querySelector('.material-symbols-outlined');
    if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility_off';
    } else {
        input.type = 'password';
        icon.textContent = 'visibility';
    }
});

// Form submission
document.getElementById('signup-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();

    const firstName = document.getElementById('first-name').value.trim();
    const lastName  = document.getElementById('last-name').value.trim();
    const matric    = document.getElementById('matric').value.trim();
    const dept      = document.getElementById('department').value;
    const faculty   = document.getElementById('faculty').value;
    const password  = document.getElementById('password').value;
    const confirm   = document.getElementById('confirm-password').value;

    // Validation
    if (!firstName) { showToast('Please enter your first name', 'error'); document.getElementById('first-name').focus(); return; }
    if (!lastName)  { showToast('Please enter your surname', 'error'); document.getElementById('last-name').focus(); return; }
    if (!matric)    { showToast('Please enter your matric number', 'error'); document.getElementById('matric').focus(); return; }
    if (!dept)      { showToast('Please select a department', 'error'); document.getElementById('department').focus(); return; }
    if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); document.getElementById('password').focus(); return; }
    if (password !== confirm) { showToast('Passwords do not match', 'error'); document.getElementById('confirm-password').focus(); return; }

    const btn = document.getElementById('signup-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-lg">progress_activity</span> Creating account...';

    try {
        await apiCall('/auth/register/', {
            method: 'POST',
            body: JSON.stringify({
                matric,
                first_name: firstName,
                last_name: lastName,
                department: dept,
                faculty,
                password,
                confirm_password: confirm,
            }),
        });
        showToast('Account created! Redirecting to login...', 'success');
        setTimeout(() => window.location.href = '/', 1500);
    } catch (err) {
        showToast(err.message || 'Registration failed. Please try again.', 'error');
        btn.disabled = false;
        btn.innerHTML = '<span>Create Account</span><span class="material-symbols-outlined text-[18px]">arrow_forward</span>';
    }
});
</script>

<script>
// ============================================
// AU Voting System - Shared Frontend Logic
// ============================================

const API_BASE = 'http://localhost:8000/api';

// --- Dark Mode ---
function initDarkMode() {
    const saved = localStorage.getItem('au-dark-mode');
    if (saved === 'true' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }
}

function toggleDarkMode() {
    document.documentElement.classList.toggle('dark');
    localStorage.setItem('au-dark-mode', document.documentElement.classList.contains('dark'));
    updateToggleIcon();
}

function updateToggleIcon() {
    const btn = document.getElementById('dark-mode-toggle');
    if (btn) {
        const icon = btn.querySelector('.material-symbols-outlined');
        if (icon) {
            icon.textContent = document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
        }
    }
}

// --- API Client ---
async function apiCall(endpoint, options = {}) {
    const token = localStorage.getItem('au-token');
    const headers = { 'Content-Type': 'application/json', ...options.headers };
    if (token) headers['Authorization'] = `Token ${token}`;

    const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
    const data = await response.json().catch(() => ({}));

    if (!response.ok) {
        const errorMsg = data.error || data.detail || Object.values(data).flat().join(', ') || 'Request failed';
        throw { status: response.status, message: errorMsg, data };
    }
    return data;
}

// --- Auth Helpers ---
function getSession() {
    try { return JSON.parse(localStorage.getItem('au-session')); } catch { return null; }
}

function setSession(data) {
    localStorage.setItem('au-session', JSON.stringify(data));
}

function clearSession() {
    localStorage.removeItem('au-session');
    localStorage.removeItem('au-token');
}

function requireStudentAuth() {
    const s = getSession();
    if (!s || s.role !== 'student') { window.location.href = '/'; return null; }
    return s;
}

function requireAdminAuth() {
    const s = getSession();
    if (!s || s.role !== 'admin') { window.location.href = '/'; return null; }
    return s;
}

async function logout() {
    try { await apiCall('/auth/logout/', { method: 'POST' }); } catch { }
    clearSession();
    window.location.href = '/';
}

// --- Toast Notifications ---
function showToast(message, type) {
    const colors = {
        success: 'bg-green-600',
        error: 'bg-red-600',
        info: 'bg-primary'
    };
    const toast = document.createElement('div');
    toast.className = 'fixed top-6 right-6 z-[200] ' + (colors[type] || colors.info) + ' text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 animate-slide-in font-medium text-sm';
    toast.innerHTML = '<span class="material-symbols-outlined text-lg">' +
        (type === 'success' ? 'check_circle' : type === 'error' ? 'error' : 'info') +
        '</span>' + message;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(100px)'; setTimeout(() => toast.remove(), 300); }, 3000);
}

// --- Student Navigation (Floating FAB) ---
function createStudentNav(currentPage) {
    const pages = [
        { href: '/dashboard.html', icon: 'space_dashboard', label: 'Dashboard', id: 'dashboard' },
        { href: '/elections.html', icon: 'how_to_vote', label: 'Elections', id: 'elections' },
        { href: '/results.html', icon: 'bar_chart', label: 'Election Results', id: 'results' },
        { href: '/profile.html', icon: 'account_circle', label: 'My Profile', id: 'profile' },
    ];
    _createFloatingNav(pages, currentPage);
}

// --- Admin Navigation (Floating FAB) ---
function createAdminNav(currentPage) {
    const pages = [
        { href: '/admin.html', icon: 'admin_panel_settings', label: 'Dashboard', id: 'admin' },
        { href: '/monitoring.html', icon: 'analytics', label: 'Live Monitoring', id: 'monitoring' },
        { href: '/create-election.html', icon: 'add_circle', label: 'Create Election', id: 'create-election' },
        { href: '/admin-results.html', icon: 'assessment', label: 'Results Report', id: 'admin-results' },
        { href: '/admin-settings.html', icon: 'settings', label: 'Profile & Settings', id: 'admin-settings' },
    ];
    _createFloatingNav(pages, currentPage);
}

// --- Floating Nav Builder (shared) ---
function _createFloatingNav(pages, currentPage) {
    const nav = document.createElement('div');
    nav.id = 'floating-nav';
    nav.innerHTML = `
    <button id="nav-toggle" onclick="document.getElementById('floating-nav').classList.toggle('open')"
      class="fixed bottom-6 left-6 z-[100] size-14 rounded-full bg-primary text-white shadow-xl shadow-primary/30 flex items-center justify-center hover:bg-[#002D7A] transition-all hover:scale-105 active:scale-95 cursor-pointer">
      <span class="material-symbols-outlined text-2xl">menu</span>
    </button>
    <div id="nav-panel" class="fixed bottom-24 left-6 z-[99] bg-white dark:bg-[#141414] rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-700 p-3 w-64 transition-all origin-bottom-left scale-0 opacity-0">
      <div class="flex items-center justify-between px-3 py-2 mb-2 border-b border-slate-100 dark:border-slate-800">
        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Navigation</span>
        <button id="dark-mode-toggle" onclick="toggleDarkMode()" class="size-8 rounded-lg flex items-center justify-center text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors cursor-pointer">
          <span class="material-symbols-outlined text-lg">${document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode'}</span>
        </button>
      </div>
      <nav class="flex flex-col gap-0.5 max-h-80 overflow-y-auto">
        ${pages.map(p => `
          <a href="${p.href}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors ${p.id === currentPage
            ? 'bg-primary/10 text-primary'
            : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white'
        }">
            <span class="material-symbols-outlined text-lg">${p.icon}</span>
            ${p.label}
          </a>
        `).join('')}
      </nav>
    </div>
  `;
    document.body.appendChild(nav);

    const style = document.createElement('style');
    style.textContent = `
    #floating-nav.open #nav-panel { transform: scale(1); opacity: 1; }
    #floating-nav.open #nav-toggle { background: #ef4444; }
    #floating-nav.open #nav-toggle span { font-size: 0; }
    #floating-nav.open #nav-toggle span::after { content: 'close'; font-size: 24px; font-family: 'Material Symbols Outlined'; }
    #nav-panel { transition: transform 0.2s ease, opacity 0.2s ease; }
    .animate-slide-in { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity:0; transform: translateX(100px); } to { opacity:1; transform: translateX(0); } }
  `;
    document.head.appendChild(style);

    document.addEventListener('click', (e) => {
        const nav = document.getElementById('floating-nav');
        if (nav && !nav.contains(e.target)) nav.classList.remove('open');
    });
}

// Init dark mode on every page
initDarkMode();

// Sign Up Page Logic
document.addEventListener('DOMContentLoaded', () => {
    createStudentNav('signup');

    const form = document.querySelector('form');
    const inputs = form?.querySelectorAll('input');
    const selects = form?.querySelectorAll('select');
    // Find the actual Sign Up button by text content
    const signUpBtn = Array.from(form?.querySelectorAll('button') || []).find(b => b.textContent.includes('Sign Up'));

    // Fix "Login" link
    document.querySelectorAll('a').forEach(a => {
        if (a.textContent.trim() === 'Login') a.href = '/';
    });

    // Department -> Faculty auto-fill
    const deptFacultyMap = {
        cs: 'Science',
        law: 'Law',
        mass_comm: 'Arts',
        accounting: 'Management Sciences',
    };
    const deptSelect = selects?.[0];
    const facultyInput = form?.querySelector('input[readonly]');
    if (deptSelect && facultyInput) {
        deptSelect.addEventListener('change', () => {
            facultyInput.value = deptFacultyMap[deptSelect.value] || '';
        });
    }

    // Password visibility toggles
    form?.querySelectorAll('button[type="button"]').forEach(btn => {
        if (btn === signUpBtn) return;
        btn.addEventListener('click', () => {
            const input = btn.closest('.relative')?.querySelector('input');
            if (input) {
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                btn.querySelector('.material-symbols-outlined').textContent = isPassword ? 'visibility_off' : 'visibility';
            }
        });
    });

    // Sign Up action
    if (signUpBtn) {
        signUpBtn.addEventListener('click', async () => {
            const firstName = inputs[0]?.value?.trim();
            const lastName = inputs[1]?.value?.trim();
            const matric = inputs[2]?.value?.trim();
            const dept = deptSelect?.value;
            // inputs[3] is the readonly Faculty input, so password is [4] and confirm is [5]
            const password = inputs[4]?.value;
            const confirmPassword = inputs[5]?.value;

            if (!firstName) { showToast('Please enter your first name', 'error'); inputs[0].focus(); return; }
            if (!lastName) { showToast('Please enter your surname', 'error'); inputs[1].focus(); return; }
            if (!matric) { showToast('Please enter your matric number', 'error'); inputs[2].focus(); return; }
            if (!dept) { showToast('Please select a department', 'error'); return; }
            if (!password || password.length < 6) { showToast('Password must be at least 6 characters', 'error'); inputs[4].focus(); return; }
            if (password !== confirmPassword) { showToast('Passwords do not match', 'error'); inputs[5].focus(); return; }

            signUpBtn.disabled = true;
            signUpBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-lg">progress_activity</span> Creating account...';

            try {
                await apiCall('/auth/register/', {
                    method: 'POST',
                    body: JSON.stringify({
                        matric,
                        first_name: firstName,
                        last_name: lastName,
                        department: deptSelect.options[deptSelect.selectedIndex].text,
                        faculty: deptFacultyMap[dept] || '',
                        password,
                        confirm_password: confirmPassword,
                    }),
                });

                showToast('Account created! Please log in.', 'success');
                setTimeout(() => window.location.href = '/', 1200);
            } catch (err) {
                showToast(err.message || 'Registration failed', 'error');
                signUpBtn.disabled = false;
                signUpBtn.textContent = 'Create Account';
            }
        });
    }
});

</script>
</body>
</html>
